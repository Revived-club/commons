syntax = "proto3";

package club.revived.commons.v1.proto;

import "commons.proto";
import "options.proto";

option java_multiple_files = true;
option java_package = "club.revived.commons.proto";

message Envelope {
  // ID used to correlate between requests, acknowledgements and responses
  UUID correlation_id = 1;
  // ID of the message's target service
  string target = 2;
  // Bytes (in ByteString/ByteArray) of the actual message
  bytes payload = 3;
  // ID of the message's sender
  string sender = 4;
  // Wether the message is a request or not
  bool is_request = 5;
  // Wether the message is an acknowledgement or not
  bool is_ack = 6;
}
