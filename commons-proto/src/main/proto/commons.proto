syntax = "proto3";

package club.revived.commons.v1.proto;

import "options.proto";

option java_multiple_files = true;
option java_package = "club.revived.commons.proto";

// Proto UUID wrapper
message UUID {
  string value = 1;
}

enum Gamemode {
  GAMEMODE_UNSPECIFIED = 0;
  GAMEMODE_DUEL = 1;
  GAMEMODE_FFA = 2;
  GAMEMODE_BEDWARS = 3;
}

message Team {
  // UUIDs of the team members
  repeated UUID members = 1;
  // Gamemode, important for team sizes, amount of teams etc.
  Gamemode game_mode = 2;
  // The color the team will be displayed with
  string color = 3;
}

enum GameState {
  GAME_STATE_UNSPECIFIED = 0;

  GAME_STATE_PREPARING = 1;

  GAME_STATE_STARTING = 2;

  GAME_STATE_RUNNING = 3;

  GAME_STATE_ENDING = 4;

  GAME_STATE_CLOSED = 5;

  GAME_STATE_DISCARDED = 6;
}

enum ServiceType {
  SERVICE_TYPE_UNSPECIFIED = 0;

  SERVICE_TYPE_PROXY = 1;

  SERVICE_TYPE_HUB = 2;

  SERVICE_TYPE_GAME = 3;
}

message PlayerProfile {
  option (kv_store_key) = "player:{uuid}";

  // The player's uuid
  UUID uuid = 1;
  // The Player's username
  string username = 2;
  // The last login timestamp as long
  int64 last_login = 3;
  // List of permission groups the player is in
  repeated string permission_groups = 4;
}
