syntax = "proto3";

package club.revived.commons.proto;

import "options.proto";

option java_multiple_files = true;
option java_package = "club.revived.commons.proto";

// Proto UUID wrapper
message UUID {
  string value = 1;
}

enum Gamemode {
  DUEL = 0;
  FFA = 1;
  BEDWARS = 2;
}

message Team {
  // UUIDs of the team members
  repeated UUID members = 1;
  // Gamemode, important for team sizes, amount of teams etc.
  Gamemode game_mode = 2;
  // The color the team will be displayed with
  string color = 3;
}

enum GameState {
  PREPARING = 0;
  STARTING = 1;
  RUNNING = 2;
  ENDING = 3;
  CLOSED = 4;
  DISCARDED = 5;
}

enum ServiceType {
  PROXY = 0;
  HUB = 1;
  GAME = 2;
}

message PlayerProfile {
  option (kv_store_key) = "player:{uuid}";

  // The player's uuid
  UUID uuid = 1;
  // The Player's username
  string username = 2;
  // The last login timestamp as long
  int64 last_login = 3;
  // List of permission groups the player is in
  repeated string permission_groups = 4;
}
