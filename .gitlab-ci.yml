stages:
  - build
  - deploy

variables:
  REPOSILITE_URL: "https://mvn.revived.club"
  REPOSILITE_USER: "admin"              
  REPOSILITE_TOKEN: "$REPOSILITE_TOKEN"

build:
  stage: build
  image: gradle:9.6-jdk17
  script:
    - gradle clean build
  artifacts:
    paths:
      - build/libs/*.jar
    expire_in: 1 hour

deploy_snapshots:
  stage: deploy
  image: gradle:9.6-jdk17
  only:
    - branches
    - merge_requests
  except:
    - tags
  script:
    - echo "Deploying snapshot to Reposilite..."
    - gradle publish \
        -PreposiliteUrl=${REPOSILITE_URL}/snapshots/ \
        -PreposiliteUser=${REPOSILITE_USER} \
        -PreposilitePassword=${REPOSILITE_TOKEN} \
        -PversionType=snapshot

deploy_releases:
  stage: deploy
  image: gradle:9.6-jdk17
  only:
    - tags
  script:
    - echo "Deploying release to Reposilite..."
    - gradle publish \
        -PreposiliteUrl=${REPOSILITE_URL}/releases/ \
        -PreposiliteUser=${REPOSILITE_USER} \
        -PreposilitePassword=${REPOSILITE_TOKEN} \
        -PversionType=release
